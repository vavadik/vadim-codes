name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/composer-ai-web/**'
      - 'packages/composer-ai-contracts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            corepack enable
            cd ${{ secrets.VPS_REPO_PATH }}
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm turbo run build --filter=composer-ai-web...
