name: Deploy Poker API

on:
  push:
    branches: [main]
    paths:
      - 'apps/poker-api/**'
      - 'packages/poker-db/**'
      - 'packages/poker-contracts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm" && source "$NVM_DIR/nvm.sh"
            cd ${{ secrets.VPS_REPO_PATH }}
            git pull origin main
            docker compose up -d postgres
            pnpm install --frozen-lockfile
            pnpm turbo run build --filter=poker-api...
            pnpm --filter=@vadim-codes/poker-db migrate:deploy
            pm2 reload apps/poker-api/ecosystem.config.cjs --only poker-api --update-env
