name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/composer-ai-api/**'
      - 'packages/composer-ai-db/**'
      - 'packages/composer-ai-contracts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm" && source "$NVM_DIR/nvm.sh"
            cd ${{ secrets.VPS_REPO_PATH }}
            git pull origin main
            docker compose up -d postgres
            pnpm install --frozen-lockfile
            pnpm turbo run build --filter=composer-ai-api...
            pnpm --filter=composer-ai-db migrate:deploy
            pm2 reload ecosystem.config.cjs --only composer-ai-api --update-env
