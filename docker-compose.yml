services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-composer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-composer}
      POSTGRES_DB: ${POSTGRES_DB:-composer_ai}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-composer} -d ${POSTGRES_DB:-composer_ai}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
